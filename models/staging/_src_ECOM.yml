sources:
  - name: ecom_raw_staging
    database: raw
    schema: ecom
    tables:
      - name : orders
        description: "this table contains order information including order_id, customer_id, order_status, purchase_timestamp, order and delivery delivery status."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: order_id
            description: "unique identifier for each order."
            tests:
              - not_null
          - name: customer_id
            description: "identifier for the customer who placed the order."
            tests:
              - not_null

      - name : customers
        description: "this table contains customer information including customer_id, customer_unique_id, customer_zip_code_prefix, customer_city, and customer_state."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: customer_id
            description: "unique identifier for each customer."
            tests:
              - not_null
          - name: customer_unique_id
            description: "unique identifier for each customer across multiple orders."
            tests:
              - not_null
          - name: customer_zip_code_prefix
            description: "zip code prefix of the customer's address."
            tests:
              - not_null
          - name: customer_city
            description: "city of the customer's address."
            tests:
              - not_null
          - name: customer_state
            description: "state of the customer's address."
            tests:
              - not_null


      - name: sellers
        description: "this table contains seller information including seller_id, seller_zip_code_prefix, seller_city, and seller_state."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: seller_id
            description: "unique identifier for each seller."
            tests:
              - not_null
          - name: seller_zip_code_prefix
            description: "zip code prefix of the seller's address."
            tests:
              - not_null
          - name: seller_city
            description: "city of the seller's address."
            tests:
              - not_null
          - name: seller_state
            description: "state of the seller's address."
            tests:
              - not_null

      - name: order_items
        description: "this table contains order item information including order_id, order_item_id, product_id, seller_id, shipping_limit_date, price, freight_value."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: order_id
            description: "identifier for the order to which the item belongs."
            tests:
              - not_null
          - name: order_item_id
            description: "unique identifier for each item within an order."
            tests:
              - not_null
          - name: product_id
            description: "identifier for the product being ordered."
            tests:
              - not_null
          - name: seller_id
            description: "identifier for the seller fulfilling the order."
            tests:
              - not_null

      - name: payments
        description: "this table contains payment information including order_id, payment_sequential, payment_type, payment_installments, and payment_value."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: order_id
            description: "identifier for the order associated with the payment."
            tests:
              - not_null
          - name: payment_sequential
            description: "sequential number of the payment for the order."
            tests:
              - not_null
          - name: payment_type
            description: "type of payment (e.g., credit card, boleto, voucher)."
            tests:
              - not_null

      - name: products
        description: "this table contains product information including product_id, product_category_name, product_name_length, product_description_length, product_photos_qty, and product_weight_g."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: product_id
            description: "unique identifier for each product."
            tests:
              - not_null
              - unique

      - name: reviews
        description: "staging table for ecom reviews data."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: order_id
            description: "identifier for the order associated with the review."
            tests:
              - not_null
          - name: review_id
            description: "unique identifier for each review."
            tests:
              - not_null
          - name: review_score
            description: "score given in the review (e.g., 1 to 5)."
            tests:
              - not_null

      - name: geolocation
        description: "this table contains geolocation information including geolocation_zip_code_prefix, geolocation_lat, geolocation_lng, geolocation_city, and geolocation_state."
        config:
          freshness:
            warn_after: 
              count: "{{ var('freshness_warn_days', 7) }}"
              period: day
            error_after:
              count: "{{ var('freshness_error_days', 14) }}"
              period: day
          loaded_at_field: "{{ var('loaded_at_field', '_business_date') }}"
        columns:
          - name: geolocation_zip_code_prefix
            description: "zip code prefix for the geolocation."
            tests:
              - not_null
          - name: geolocation_lat
            description: "latitude of the geolocation."
            tests:
              - not_null
          - name: geolocation_lng
            description: "longitude of the geolocation."
            tests:
              - not_null
          - name: geolocation_city
            description: "city of the geolocation."
            tests:
              - not_null
          - name: geolocation_state
            description: "state of the geolocation."
            tests:
              - not_null